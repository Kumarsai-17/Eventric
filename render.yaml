services:
  - type: web
    name: eventric-backend
    env: node
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: USE_MOCK_PAYMENT
        value: true
      - key: FRONTEND_URL
        sync: false
